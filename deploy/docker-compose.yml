name: ticketshop

services:
  postgres:
    image: postgres:16-alpine
    container_name: ticketshop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    image: ticketshop-backend:latest
    container_name: ticketshop-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      DASHBOARD_BASE_URL: ${DASHBOARD_BASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
    ports:
      - "13000:3000"   # host:container — host port chosen to avoid conflicts on the LXC

  customer:
    build:
      context: ..
      dockerfile: apps/customer-app/Dockerfile
      args:
        API_URL: ${PUBLIC_API_URL}
    image: ticketshop-customer:latest
    container_name: ticketshop-customer
    restart: unless-stopped
    ports:
      - "8080:80"

  admin:
    build:
      context: ..
      dockerfile: apps/admin-dashboard/Dockerfile
      args:
        API_URL: ${PUBLIC_API_URL}
    image: ticketshop-admin:latest
    container_name: ticketshop-admin
    restart: unless-stopped
    ports:
      - "8081:80"
