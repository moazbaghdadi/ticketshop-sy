<app-header [title]="headerTitle()" />

<div class="seat-page">
  <lib-seat-layout
    [seats]="seats()"
    [selections]="selections()"
    [pendingSeatId]="pendingSeatId()"
    (seatTap)="onSeatTap($event)"
  />
</div>

<div class="bottom-bar">
  @if (pendingSeat(); as seat) {
    <div class="pending-hint">
      <span class="material-icons">event_seat</span>
      اختر جنس المسافر للمقعد رقم <strong>{{ seat.id }}</strong>
    </div>
    <div class="gender-btns">
      <button
        class="gender-btn male"
        [disabled]="isGenderConflicting(seat, 'male')"
        (click)="assignGender('male')"
      >
        <span class="material-icons">man</span>
        ذكر
      </button>
      <button
        class="gender-btn female"
        [disabled]="isGenderConflicting(seat, 'female')"
        (click)="assignGender('female')"
      >
        <span class="material-icons">woman</span>
        أنثى
      </button>
    </div>
  } @else if (selectedCount() > 0) {
    <div class="summary">
      <div class="seats-info">
        <span class="label">المقاعد:</span>
        <span class="value">{{ selectedSeatNumbers() }}</span>
      </div>
      <div class="price-info">
        <span class="label">المجموع:</span>
        <span class="value price">{{ formatPrice(subtotal()) }}</span>
      </div>
    </div>
    <button class="continue-btn" (click)="proceed()">متابعة</button>
  } @else {
    <span class="hint">اضغط على مقعد متاح للبدء</span>
    <button class="continue-btn" disabled>متابعة</button>
  }
</div>
