server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache fingerprinted assets
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback so deep links survive a hard refresh
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache index.html — it pins the asset hashes
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
